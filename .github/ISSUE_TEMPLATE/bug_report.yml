name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Config (island-bridge.json)
      description: Your config file (hide sensitive info)
      render: json
  - type: textarea
    id: output
    attributes:
      label: Error output
      description: Paste the terminal output
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "1.0.0"
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Ubuntu 22.04 / macOS 14"
